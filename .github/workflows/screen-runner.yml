name: Build Screen Runner

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

# Read-only: no job in this workflow needs a write token. PR artifact info is
# surfaced via the job summary instead of a PR comment, so the untrusted PR code
# in the build matrix never runs alongside a writable token.
permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
            shell: bash
          - os: macos-latest
            platform: macos
            shell: bash
          - os: windows-latest
            platform: windows
            shell: msys2 {0}

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - name: Setup MSYS2
        if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884  # v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_ttf
            mingw-w64-x86_64-imagemagick

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install dependencies (Linux)
        if: matrix.platform == 'linux'
        run: scripts/ci/ci.sh install-screen-runner-deps

      - name: Install dependencies (macOS)
        if: matrix.platform == 'macos'
        run: brew install sdl2 sdl2_ttf imagemagick

      - name: Build
        run: |
          scripts/ci/ci.sh build-screen-runner \
            ${{ matrix.platform == 'windows' && '-G Ninja' || '' }}

      - name: Package artifact
        run: scripts/ci/ci.sh package-screen-runner artifact

      - name: Bundle DLLs (Windows)
        if: matrix.platform == 'windows'
        run: |
          ldd artifact/screen_runner.exe \
            | grep -i mingw64 \
            | awk '{print $3}' \
            | while read -r dll; do
                cp "$dll" artifact/
              done

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: screen-runner-${{ matrix.platform }}
          path: artifact/

  pr-summary:
    # Read-only: surface the artifact info in the run's job summary instead of a
    # PR comment, so no pull_request run ever holds a write token. Runs for all
    # PRs (fork or not) since it needs no special permissions.
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Write artifact summary
        run: |
          {
            echo "### Screen Runner artifacts"
            echo ""
            echo "Native desktop builds for this PR (Linux / macOS / Windows) are attached to"
            echo "this run — see the **Artifacts** section at the top of the run's summary page."
            echo "Artifacts require GitHub authentication to download and expire after 90 days."
            echo ""
            echo "#### macOS: removing quarantine"
            echo "macOS Gatekeeper blocks unsigned downloaded binaries. After extracting, run:"
            echo '```'
            echo "xattr -d com.apple.quarantine screen_runner"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
