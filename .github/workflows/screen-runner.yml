name: Build Screen Runner

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
            shell: bash
          - os: macos-latest
            platform: macos
            shell: bash
          - os: windows-latest
            platform: windows
            shell: msys2 {0}

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - name: Setup MSYS2
        if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_ttf
            mingw-w64-x86_64-imagemagick

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install dependencies (Linux)
        if: matrix.platform == 'linux'
        run: scripts/ci/ci.sh install-screen-runner-deps

      - name: Install dependencies (macOS)
        if: matrix.platform == 'macos'
        run: brew install sdl2 sdl2_ttf imagemagick

      - name: Build
        run: |
          scripts/ci/ci.sh build-screen-runner \
            ${{ matrix.platform == 'windows' && '-G Ninja' || '' }}

      - name: Package artifact
        run: scripts/ci/ci.sh package-screen-runner artifact

      - name: Bundle DLLs (Windows)
        if: matrix.platform == 'windows'
        run: |
          ldd artifact/screen_runner.exe \
            | grep -i mingw64 \
            | awk '{print $3}' \
            | while read -r dll; do
                cp "$dll" artifact/
              done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: screen-runner-${{ matrix.platform }}
          path: artifact/

  pr-comment:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Post artifact links
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- screen-runner-artifacts -->';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}#artifacts`;
            const body = [
              marker,
              '### Screen Runner Artifacts',
              '',
              `Build artifacts for this PR are available at the [workflow run artifacts page](${runUrl}):`,
              '',
              '| Platform | Artifact |',
              '|----------|----------|',
              '| Linux | `screen-runner-linux` |',
              '| macOS | `screen-runner-macos` |',
              '| Windows | `screen-runner-windows` |',
              '',
              '_Artifacts require GitHub authentication to download and expire after 90 days._',
              '',
              '#### macOS: removing quarantine',
              'macOS Gatekeeper blocks unsigned downloaded binaries. After extracting, run:',
              '```',
              'xattr -d com.apple.quarantine screen_runner',
              '```',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
