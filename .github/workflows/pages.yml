name: Pages (screenshots + web runner)

# Builds the screenshot gallery and the WASM web-runner playground into ONE site
# and publishes it with the official GitHub Pages action.
#
# Security posture:
#   - Top-level token is read-only. Only the deploy job opts into the minimal
#     Pages-publish scopes (pages: write + id-token). NOTHING uses contents:write
#     and nothing pushes to a branch, so a compromised build step or third-party
#     action cannot tamper with the repo.
#   - Deploys happen ONLY on push to main / manual dispatch (trusted, post-merge).
#     pull_request runs are build + read-only checks; they never hold a write
#     token, so there is no fork-vs-non-fork distinction to guard.
#   - All actions are pinned to commit SHAs.
#
# One-time setup: Settings -> Pages -> Build and deployment -> Source = "GitHub
# Actions". Optionally restrict the `github-pages` environment to the `main`
# branch (Settings -> Environments) for enforced, platform-level protection.

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

env:
  # Pinned seedsigner-language-packs ref. Screens does not commit packs — it builds them
  # in-run from this checkout (inside the pack repo's pinned GHCR toolchain image). Bump
  # this SHA to adopt new locale policy / translations. Keep it in sync with runner-core-test.yml.
  PACK_REPO: kdmukAI-bot/seedsigner-language-packs
  PACK_REF: a9e39dabf60e093bb3d1494eb4728f83342c878b

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Build the combined site on every event (incl. fork PRs). Read-only.
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      # ccache's cache dir (persisted by actions/cache below); ci.sh routes cmake through ccache.
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Checkout language-packs (pinned) with submodules
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: ${{ env.PACK_REPO }}
          ref: ${{ env.PACK_REF }}
          submodules: recursive
          path: seedsigner-language-packs

      - name: Install screenshot dependencies
        run: scripts/ci/ci.sh install-screenshot-deps

      # Cache C/C++ object files (ccache) for the screenshot_gen build; ccache is installed with
      # the deps above and ci.sh routes cmake through it. Gated to non-PR events to match the
      # compile step below — the gallery build only runs on push/dispatch, so there's nothing to
      # cache on PRs. The WASM web-runner build is not ccache'd (emsdk is cached separately above).
      # First-party actions/cache only — no repo write token. Unique per-run key + prefix
      # restore-keys so the post-job save is never skipped (which would freeze the cache).
      - name: Restore ccache
        if: github.event_name != 'pull_request'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-pages-${{ github.run_id }}
          restore-keys: |
            ccache-pages-

      # Build the packs + localized scenarios the gallery renders, from the pinned
      # language-packs checkout (packs build inside its GHCR toolchain image; scenarios
      # are pure-Python). Not committed — see .gitignore.
      - name: Build language packs + localized scenarios
        run: |
          scripts/ci/ci.sh build-fontpacks
          scripts/ci/ci.sh gen-localized-scenarios
        env:
          SS_LANGPACKS_REPO_DIR: ${{ github.workspace }}/seedsigner-language-packs

      # DEV-SPEED (2026-07-11): skip the screenshot render on PRs. Building + rendering
      # the full localized gallery is the long pole of PR CI and has little value while
      # the screens churn heavily. It STILL runs on push to main / manual dispatch, so
      # the deployed gallery stays current after merge. assemble-site tolerates the
      # missing gallery (guards on the screenshots dir), so the web-runner PR build/upload
      # is unaffected. RE-ENABLE FOR PRs NEAR PRODUCTION: remove the `if:` guard below so
      # it runs on every event again.
      - name: Build & generate screenshots
        if: github.event_name != 'pull_request'
        run: |
          scripts/ci/ci.sh build-screenshots
          scripts/ci/ci.sh generate-screenshots

      # Surface cache hit/miss counts — a dead cache is otherwise invisible.
      - name: ccache stats
        if: github.event_name != 'pull_request'
        run: ccache -s

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@6ab9eb1bda2574c4ddb79809fc9247783eaf9021  # v14
        with:
          version: 3.1.74
          actions-cache-folder: emsdk-cache

      - name: Build web runner (WASM)
        run: scripts/ci/ci.sh build-web-runner

      - name: Assemble combined site
        run: scripts/ci/ci.sh assemble-site site

      - name: Upload site artifact (download & open locally to review)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: site
          path: site/

      # Only needed for deployment; skipped on PRs (which never deploy).
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3
        with:
          path: site

  # Read-only screenshot regression diff for PRs: generate the BASE screenshots
  # in-run and compare against the PR's gallery (reused from the `site` artifact).
  # Results go to the job summary + an artifact — no PR comment, no write token.
  #
  # TEMPORARILY DISABLED (early-stage dev, 2026-07-07): rebuilding the base ref's whole
  # gallery (pack build + C++ build + render) roughly doubles the PR build time, and a
  # render-diff has little value while the screens churn heavily. The job is kept intact
  # (and its ci.sh helpers untouched) so it can be reactivated near production.
  #   RE-ENABLE: delete the `false &&` guard on the `if:` below, restoring
  #              `if: github.event_name == 'pull_request'`.
  screenshot-diff:
    needs: build
    if: false && github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout (head, for scripts)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 1

      - name: Checkout base ref with submodules
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          submodules: recursive
          fetch-depth: 1
          path: base

      - name: Checkout language-packs (pinned) with submodules
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: ${{ env.PACK_REPO }}
          ref: ${{ env.PACK_REF }}
          submodules: recursive
          path: seedsigner-language-packs

      - name: Download PR site (the "after" gallery)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: site
          path: after

      - name: Install screenshot dependencies (base gallery build + compare)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libpng-dev imagemagick rsync python3 python3-pip

      # Build the BASE ref's gallery with the same pinned language-packs checkout as HEAD, so
      # the diff isolates render-code changes rather than pack drift. The base gallery is
      # BEST-EFFORT: across this migration the base ref's ci.sh may predate the pack-build
      # wiring, so a failure here degrades the (advisory, non-gating) diff instead of failing
      # the job. base/ci.sh cd's to base/, so pass an absolute SS_LANGPACKS_REPO_DIR and let it
      # build packs via the pinned build_packs.sh (Docker/GHCR).
      - name: Generate BASE screenshots (best-effort)
        continue-on-error: true
        env:
          SS_LANGPACKS_REPO_DIR: ${{ github.workspace }}/seedsigner-language-packs
        run: |
          base/scripts/ci/ci.sh build-fontpacks || echo "base build-fontpacks failed; diff degraded"
          base/scripts/ci/ci.sh build-screenshots
          base/scripts/ci/ci.sh generate-screenshots

      - name: Compare BASE vs PR
        run: |
          scripts/ci/ci.sh compare-screenshots \
            --before-dir base/tools/apps/screenshot_generator/screenshots \
            --after-dir after \
            --out-dir screenshot-diff \
            --pr-number ${{ github.event.number }} || true
          scripts/ci/ci.sh screenshot-diff-summary screenshot-diff/compare_result.json >> "$GITHUB_STEP_SUMMARY"

      - name: Upload screenshot diff report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: screenshot-diff
          path: screenshot-diff/

  # Publish the combined site. Only on trusted, post-merge events.
  deploy:
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4
