name: Runner Core Test

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

# Read-only: this job builds and runs a headless test, surfacing pass/fail via
# the run status. No write token is ever exposed to untrusted PR code.
permissions:
  contents: read

env:
  # Pinned seedsigner-language-packs ref. Screens does not commit packs — it builds them
  # in-run from this checkout (inside the pack repo's pinned GHCR toolchain image). Bump
  # this SHA to adopt new locale policy / translations. Keep it in sync with pages.yml.
  PACK_REPO: kdmukAI-bot/seedsigner-language-packs
  PACK_REF: a9e39dabf60e093bb3d1494eb4728f83342c878b

jobs:
  test:
    runs-on: ubuntu-24.04
    env:
      # ccache's cache dir (persisted by actions/cache below); ci.sh routes cmake through ccache.
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Checkout language-packs (pinned) with submodules
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: ${{ env.PACK_REPO }}
          ref: ${{ env.PACK_REF }}
          submodules: recursive
          path: seedsigner-language-packs

      - name: Install dependencies
        run: scripts/ci/ci.sh install-runner-core-test-deps

      # Cache C/C++ object files (ccache) so unchanged LVGL + screen sources aren't recompiled
      # every run; ccache is installed with the deps above and ci.sh routes cmake through it.
      # First-party actions/cache only — read/write to the Actions cache, no repo write token,
      # preserving the read-only posture above. Unique per-run key + prefix restore-keys:
      # actions/cache skips the post-job save on an exact-key hit, which would freeze the cache
      # after first save; a fresh key each run always saves, and restore-keys pulls the newest.
      - name: Restore ccache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-runner-core-test-${{ github.run_id }}
          restore-keys: |
            ccache-runner-core-test-

      # The test loads the packs (lang-packs/ — zh/hi/ru … among the curated pack_locales)
      # to verify the font dedup + retire/reap lifecycle across scripts. Built in-run from
      # the pinned language-packs checkout, inside its GHCR toolchain image. Full language
      # support is a core requirement — these locale cases are exercised in CI, never skipped.
      - name: Build language packs
        run: scripts/ci/ci.sh build-fontpacks
        env:
          SS_LANGPACKS_REPO_DIR: ${{ github.workspace }}/seedsigner-language-packs

      - name: Build and run headless runner_core test
        run: scripts/ci/ci.sh test-runner-core

      # Surface cache hit/miss counts — a dead cache is otherwise invisible.
      - name: ccache stats
        if: always()
        run: ccache -s
