name: Build & Deploy Screenshots

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

jobs:
  build:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libpng-dev imagemagick

      - name: Build screenshot generator
        run: |
          cmake -S tools/screenshot_generator -B tools/screenshot_generator/build -DCMAKE_BUILD_TYPE=Release
          cmake --build tools/screenshot_generator/build -j"$(nproc)"

      - name: Generate screenshots
        run: tools/screenshot_generator/build/screenshot_gen

      - name: Upload screenshot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: tools/screenshot_generator/screenshots/

  deploy-screenshots:
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Download screenshot artifacts
        uses: actions/download-artifact@v4
        with:
          name: screenshots
          path: screenshots

      - name: Determine deploy path
        id: path
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "dest_dir=previews/pr-${{ github.event.number }}" >> "$GITHUB_OUTPUT"
            echo "msg=Deploy PR #${{ github.event.number }} preview" >> "$GITHUB_OUTPUT"
          else
            echo "dest_dir=." >> "$GITHUB_OUTPUT"
            echo "msg=Deploy stable screenshots" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./screenshots
          destination_dir: ${{ steps.path.outputs.dest_dir }}
          commit_message: ${{ steps.path.outputs.msg }}
          keep_files: true

      - name: Post PR preview comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          DEST_DIR: ${{ steps.path.outputs.dest_dir }}
        with:
          script: |
            const destDir = process.env.DEST_DIR;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            const pagesUrl = `https://${owner}.github.io/${repo}/${destDir}/`;

            const marker = '<!-- ss-lvgl-render-tests -->';
            const body = `${marker}\n### SeedSigner LVGL screen tests: [view results gallery](${pagesUrl})`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });

            const existingComment = comments.find(c => c.body.includes(marker));

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  cleanup-pr-preview-pages:
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove PR preview directory
        env:
          PR_NUM: ${{ github.event.number }}
        run: |
          TARGET="previews/pr-${PR_NUM}"
          if [ -d "$TARGET" ]; then
            rm -rf "$TARGET"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "pages: remove preview for closed PR #${PR_NUM}"
            git push
          else
            echo "No preview directory for PR #${PR_NUM}; nothing to clean."
          fi
