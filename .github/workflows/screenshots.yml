name: Build & Deploy Screenshots

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

jobs:
  build:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libpng-dev imagemagick

      - name: Build screenshot generator
        run: |
          cmake -S tools/screenshot_generator -B tools/screenshot_generator/build -DCMAKE_BUILD_TYPE=Release
          cmake --build tools/screenshot_generator/build -j"$(nproc)"

      - name: Generate screenshots
        run: tools/screenshot_generator/build/screenshot_gen

      - name: Upload screenshot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: tools/screenshot_generator/screenshots/

  deploy-stable:
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download screenshot artifacts
        uses: actions/download-artifact@v4
        with:
          name: screenshots
          path: screenshots

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./screenshots
          destination_dir: .
          commit_message: "Deploy stable screenshots"
          keep_files: true

  compare-and-deploy-pr:
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    steps:
      - name: Checkout repo (for compare script)
        uses: actions/checkout@v4

      - name: Download screenshot artifacts
        uses: actions/download-artifact@v4
        with:
          name: screenshots
          path: after

      - name: Checkout gh-pages baseline
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: baseline

      - name: Install comparison dependencies
        run: sudo apt-get update && sudo apt-get install -y imagemagick python3

      - name: Run screenshot comparison
        run: |
          python3 tools/screenshot_generator/compare_screenshots.py \
            --before-dir baseline \
            --after-dir after \
            --out-dir report \
            --pr-number ${{ github.event.number }}

      - name: Deploy diff report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./report
          destination_dir: previews/pr-${{ github.event.number }}
          commit_message: "Deploy screenshot diff for PR #${{ github.event.number }}"
          keep_files: true

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            const marker = '<!-- ss-lvgl-render-tests -->';

            let body;
            try {
              const result = JSON.parse(fs.readFileSync('report/compare_result.json', 'utf8'));
              const s = result.summary;
              const pagesUrl = `https://${owner}.github.io/${repo}/previews/pr-${issue_number}/`;

              if (s.changed === 0 && s.new === 0 && s.removed === 0) {
                body = `${marker}\n### SeedSigner LVGL screen tests\nNo screenshots affected by this PR (${s.unchanged} unchanged).`;
              } else {
                const parts = [];
                if (s.changed > 0) parts.push(`**${s.changed}** changed`);
                if (s.new > 0) parts.push(`**${s.new}** new`);
                if (s.removed > 0) parts.push(`**${s.removed}** removed`);
                const diff = parts.join(', ');
                body = `${marker}\n### SeedSigner LVGL screen tests: [view diff report](${pagesUrl})\nScreenshot diff: ${diff}` + (s.unchanged > 0 ? `, ${s.unchanged} unchanged` : '');
              }
            } catch (e) {
              body = `${marker}\n### SeedSigner LVGL screen tests\n⚠️ Failed to read comparison results: ${e.message}`;
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });

            const existingComment = comments.find(c => c.body.includes(marker));

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  cleanup-pr-preview-pages:
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove PR preview directory
        env:
          PR_NUM: ${{ github.event.number }}
        run: |
          TARGET="previews/pr-${PR_NUM}"
          if [ -d "$TARGET" ]; then
            rm -rf "$TARGET"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "pages: remove preview for closed PR #${PR_NUM}"
            git push
          else
            echo "No preview directory for PR #${PR_NUM}; nothing to clean."
          fi
