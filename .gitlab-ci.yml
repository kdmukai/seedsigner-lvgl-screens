# GitLab CI — Screenshot generation, screen runner build, and Pages deployment.
#
# Builds and deploys screenshots on pushes to main.
# Screen runner build verifies compilation (Linux only).
# PR comparison is not yet implemented for GitLab (uses artifact-based Pages,
# making baseline retrieval different from the branch-based approach on other
# platforms). Contributions welcome.

stages:
  - build
  - pages

build-screenshots:
  stage: build
  image: ubuntu:24.04
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  script:
    - scripts/ci/ci.sh install-screenshot-deps
    - scripts/ci/ci.sh build-screenshots
    - scripts/ci/ci.sh generate-screenshots
  artifacts:
    paths:
      - tools/screenshot_generator/screenshots/
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

build-screen-runner:
  stage: build
  image: ubuntu:24.04
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  script:
    - scripts/ci/ci.sh install-screen-runner-deps
    - scripts/ci/ci.sh build-screen-runner
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

pages:
  stage: pages
  dependencies:
    - build-screenshots
  script:
    - mkdir -p public
    - cp -r tools/screenshot_generator/screenshots/* public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
